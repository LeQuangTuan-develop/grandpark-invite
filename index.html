<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Một lời mời nhỏ</title>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: url("https://static.vinwonders.com/production/2025/07/vui-choi-vinwonders-cua-hoi.jpg");
        background-size: cover;
        background-position: center;
        color: white;
        padding: 20px;
      }

      .overlay {
        background: rgba(0, 0, 0, 0.55);
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
      }

      .card {
        position: relative;
        width: 100%;
        max-width: 520px;

        padding: 32px;
        border-radius: 18px;

        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(6px);

        text-align: center;
        z-index: 2;

        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      h2 {
        margin-top: 0;
      }

      #text {
        font-size: 18px;
        line-height: 1.7;
        min-height: 140px;
      }

      .buttons {
        position: relative;

        display: flex;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      button {
        padding: 12px 22px;
        font-size: 16px;

        border: none;
        border-radius: 28px;

        cursor: pointer;

        transition: 0.25s;
      }

      .accept {
        background: #ff5c7c;
        color: white;
      }

      .accept:hover {
        transform: scale(1.05);
      }

      .decline {
        background: #ddd;
        color: #333;

        position: absolute;
      }

      .success {
        display: none;
        font-size: 18px;
        margin-top: 10px;

        color: #ffd6d6;
      }

      .note {
        font-size: 14px;
        opacity: 0.8;
      }

      .confetti {
        position: absolute;
        font-size: 20px;
        animation: fall 3s linear forwards;
      }

      @keyframes fall {
        0% {
          transform: translateY(-50px);
        }
        100% {
          transform: translateY(100vh);
        }
      }

      /* Mobile adjustments */

      @media (max-width: 480px) {
        #text {
          font-size: 16px;
        }

        button {
          font-size: 15px;
          padding: 10px 18px;
        }
      }
    </style>
  </head>

  <body>
    <div class="overlay"></div>

    <div class="card">
      <h2>🌿 Một lời mời nhỏ</h2>

      <div id="text"></div>

      <div class="buttons">
        <button class="accept" onclick="acceptInvite()">
          Nghe cũng hay đó
        </button>

        <button class="decline" id="declineBtn">Để em suy nghĩ</button>
      </div>

      <div class="success" id="success">
        🎉 Vậy anh sẽ chuẩn bị một buổi đi dạo thật chill nhé.
      </div>
    </div>

    <script>
      const lines = [
        "Cuối tuần này nếu em rảnh...",
        "Anh muốn mời em ghé Công viên Grand Park một chút.",
        "",
        "Chỉ đơn giản là:",
        "🎮 Chơi vài trò nhỏ",
        "🌿 Đi dạo nói chuyện",
        "🍽️ Nếu tiện thì ăn tối nhẹ",
        "",
        "Chỉ là một buổi đi dạo thư giãn thôi.",
        "",
        "Không biết em có muốn tham gia không?",
      ];

      let i = 0;
      const textDiv = document.getElementById("text");

      function typeLine() {
        if (i < lines.length) {
          let line = lines[i];
          let char = 0;

          let interval = setInterval(() => {
            textDiv.innerHTML += line.charAt(char);
            char++;

            if (char >= line.length) {
              clearInterval(interval);

              textDiv.innerHTML += "<br>";

              i++;

              setTimeout(typeLine, 450);
            }
          }, 30);
        }
      }

      typeLine();

      const declineBtn = document.getElementById("declineBtn");
      const card = document.querySelector(".card");

      let tapCount = 0;

      declineBtn.addEventListener("click", moveButton);

      function moveButton() {
        tapCount++;

        const rect = card.getBoundingClientRect();

        const x = Math.random() * (rect.width - 120);
        const y = Math.random() * (rect.height - 120);

        declineBtn.style.left = x + "px";
        declineBtn.style.top = y + "px";

        if (tapCount > 3) {
          declineBtn.style.transform = "scale(0.85)";
        }

        if (tapCount > 6) {
          declineBtn.innerText = "😅 khó quá";
        }
      }

      function acceptInvite() {
        document.getElementById("success").style.display = "block";

        for (let i = 0; i < 35; i++) {
          let conf = document.createElement("div");
          conf.className = "confetti";
          conf.innerHTML = "🎉";

          conf.style.left = Math.random() * window.innerWidth + "px";

          document.body.appendChild(conf);

          setTimeout(() => conf.remove(), 3000);
        }
      }
    </script>
  </body>
</html>
